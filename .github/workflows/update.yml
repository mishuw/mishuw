name: WakaTime Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  update-readme:
    name: Update README
    runs-on: ubuntu-latest

    steps:
      - name: Generate Wakatime Stats (JSON)
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TOTAL: true
          SYMBOL_VERSION: 2
          TIME_RANGE: "all_time"
          TIMEZONE: "Europe/Istanbul"
          OUTPUT_JSON: true
